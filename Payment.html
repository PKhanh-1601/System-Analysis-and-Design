<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout Page</title>
    <style>
        * {
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }
        body {
            margin: 0;
            padding: 0;
            background-color: #f9f9f9;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .container {
            display: flex;
            justify-content: space-between;
            max-width: 1200px;
            width: 100%;
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0px 4px 10px rgba(0, 0, 0, 0.1);
        }
        .form-container, .product-container {
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0px 4px 10px rgba(0, 0, 0, 0.1);
        }
        .form-container {
            width: 60%;
        }
        .form-group {
            display: flex;
            flex-direction: column;
            margin-bottom: 15px;
        }
        label {
            font-weight: bold;
            margin-bottom: 5px;
        }
        input {
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 5px;
            font-size: 16px;
        }
        .two-columns {
            display: flex;
            gap: 15px;
        }
        .two-columns .form-group {
            width: 100%;
        }
        .product-container {
            width: 35%;
            background-color: #fff5f8;
            border: 1px solid #ffccd5;
        }
        .product-item {
            display: flex;
            align-items: center;
            margin-bottom: 15px;
        }
        .product-item img {
            width: 60px;
            height: 60px;
            border-radius: 10px;
            margin-right: 10px;
        }
        .order-button {
            background-color: #ff4081;
            color: white;
            font-size: 18px;
            padding: 12px;
            width: 100%;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        .order-button:hover {
            background-color: #e73370;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="form-container">
            <h2>Shipping Address</h2>
            <div class="two-columns">
                <div class="form-group">
                    <label for="first-name">First Name</label>
                    <input type="text" id="first-name" placeholder="e.g., John">
                </div>
                <div class="form-group">
                    <label for="last-name">Last Name</label>
                    <input type="text" id="last-name" placeholder="e.g., Doe">
                </div>
            </div>
            <div class="two-columns">
                <div class="form-group">
                    <label for="state">State/Province</label>
                    <input type="text" id="state" placeholder="e.g., Ho Chi Minh">
                </div>
                <div class="form-group">
                    <label for="city">City</label>
                    <input type="text" id="city" placeholder="e.g., Thu Duc">
                </div>
            </div>
            <div class="form-group">
                <label for="address">Address</label>
                <input type="text" id="address" placeholder="e.g., 123 Main St">
            </div>
            <div class="two-columns">
                <div class="form-group">
                    <label for="phone">Phone</label>
                    <input type="text" id="phone" placeholder="e.g., 0123456789">
                </div>
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" placeholder="e.g., teddora@uit.edu.vn">
                </div>
            </div>
            <button class="order-button">Order</button>
        </div>
        <div class="product-container">
            <h2>Product List</h2>
            <div class="product-item">
                <img src="capybara.jpg" alt="Capybara Plush">
                <div>
                    <p>Super soft Capybara plush</p>
                    <strong>125,900đ</strong>
                </div>
            </div>
            <div class="product-item">
                <img src="bunny.jpg" alt="Bunny Plush">
                <div>
                    <p>Jellycat Bunny Rabbit</p>
                    <strong>48,000đ</strong>
                </div>
            </div>
            <hr>
            <p>Subtotal: <strong>173,900đ</strong></p>
            <p>Discount: <strong>0đ</strong></p>
            <p>Shipping Fee: <strong>Free</strong></p>
            <p>Total: <strong>173,900đ</strong></p>
        </div>
    </div>
</body>
</html>
