<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up Page</title>
    <link rel="stylesheet" href="signup.css">
</head>
<body>
    <header>
        <div class="logo">
            <img src="pic/logo.png" alt="logo" class="logo-icon">
        </div>
        <nav class="navigation">
            <a href="#">Home</a>
            <a href="#">About</a>
            <a href="#">Contact</a>
            <button class="btnLogin-popup">Log In</button>
        </nav>
    </header>
    <div class="wrapper">
        <div class="form-box signup">
            <button class="google-login">
                <img src="pic/devicon_google.png" alt="GG icon" class="gg-icon"> Continue with Google
            </button>
            <div class="divider">
                <hr>
                <span class="text">OR</span>
                <hr>
            </div>
            <form action="#">
                <div class="input-box">
                    <label>Full Name</label>
                    <div class="input-container">
                        <img src="pic/material-symbols_person-outline.png" alt="user icon" class="input-icon">
                        <input type="text" placeholder="John Meow" required>
                    </div>
                </div>
                <div class="input-box">
                    <label>Email</label>
                    <div class="input-container">
                        <img src="pic/ic_outline-email.png" alt="email icon" class="input-icon">
                        <input type="email" placeholder="Enter your email address" required>
                    </div>
                </div>
                <div class="input-box">
                    <label>Password</label>
                    <div class="input-container">
                        <img src="pic/material-symbols_lock-outline.png" alt="password icon" class="input-icon">
                        <input type="password" id="password" placeholder="Enter your password" required>
                        <button type="button" class="toggle-password" onclick="togglePassword('password')">Display</button>
                    </div>
                </div>
                <div class="input-box">
                    <label>Confirm Password</label>
                    <div class="input-container">
                        <img src="pic/material-symbols_lock-outline.png" alt="password icon" class="input-icon">
                        <input type="password" id="confirm-password" placeholder="Enter your password again" required>
                        <button type="button" class="toggle-password" onclick="togglePassword('confirm-password')">Display</button>
                    </div>
                </div>
                <div class="navigation">
                    <button class="btnSignUp-popup">Sign Up</button>
                </div>
                <div class="haveAccount">
                    <p>Already part of the fam? <a href="#" class="loginHere">Log In!</a></p>
                </div>
            </form>
        </div>
    </div>
    <script>
        function togglePassword(id) {
            var input = document.getElementById(id);
            if (input.type === "password") {
                input.type = "text";
            } else {
                input.type = "password";
            }
        }
    </script>
</body>
</html>
